<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Flowchart</title><style>body{margin:0;display:flex;justify-content:center;background:#fff}svg{max-width:100%;height:auto}</style></head><body><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1400" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6B7280"/>
    </marker>
    <linearGradient id="phase1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EEF2FF"/>
      <stop offset="100%" style="stop-color:#E0E7FF"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FEF3C7"/>
      <stop offset="100%" style="stop-color:#FDE68A"/>
    </linearGradient>
    <linearGradient id="phase3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ECFDF5"/>
      <stop offset="100%" style="stop-color:#D1FAE5"/>
    </linearGradient>
  </defs>

  <!-- 标题 -->
  <text x="500" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F2937">数字遗产管家 — 完整协议流程</text>

  <!-- ====== 阶段一：创建阶段 ====== -->
  <rect x="50" y="60" width="900" height="380" rx="12" fill="url(#phase1)" stroke="#4F46E5" stroke-width="2"/>
  <text x="500" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#4F46E5">阶段一：创建阶段</text>

  <!-- 节点 -->
  <rect x="100" y="115" width="240" height="45" rx="8" fill="#4F46E5"/>
  <text x="220" y="143" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">用户创建遗产计划</text>

  <rect x="420" y="115" width="240" height="45" rx="8" fill="#FEF3C7" stroke="#D97706"/>
  <text x="540" y="143" text-anchor="middle" font-size="12" fill="#92400E">生成随机主密钥 masterKey</text>

  <rect x="740" y="115" width="180" height="45" rx="8" fill="#F3F4F6" stroke="#6B7280"/>
  <text x="830" y="143" text-anchor="middle" font-size="12" fill="#374151">加密资产数据</text>

  <!-- 箭头 -->
  <line x1="340" y1="137" x2="415" y2="137" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="137" x2="735" y2="137" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 下方行 -->
  <rect x="100" y="190" width="240" height="55" rx="8" fill="#FEF3C7" stroke="#D97706"/>
  <text x="220" y="210" text-anchor="middle" font-size="12" fill="#92400E" font-weight="bold">双多项式构造</text>
  <text x="220" y="228" text-anchor="middle" font-size="11" fill="#92400E">P(x): 值多项式, P(0)=masterKey</text>
  <text x="220" y="240" text-anchor="middle" font-size="11" fill="#92400E">Q(x): 盲因子多项式, Q(0)=R</text>

  <rect x="420" y="190" width="240" height="55" rx="8" fill="#FEF3C7" stroke="#D97706"/>
  <text x="540" y="210" text-anchor="middle" font-size="12" fill="#92400E" font-weight="bold">计算份额与承诺</text>
  <text x="540" y="228" text-anchor="middle" font-size="11" fill="#92400E">v_i = P(i), r_i = Q(i)</text>
  <text x="540" y="240" text-anchor="middle" font-size="11" fill="#92400E">C_i = r_i·G + v_i·H</text>

  <rect x="740" y="190" width="180" height="55" rx="8" fill="#FEF3C7" stroke="#D97706"/>
  <text x="830" y="210" text-anchor="middle" font-size="12" fill="#92400E" font-weight="bold">计算主承诺</text>
  <text x="830" y="230" text-anchor="middle" font-size="11" fill="#92400E">C_master = R·G + s·H</text>

  <line x1="340" y1="217" x2="415" y2="217" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="217" x2="735" y2="217" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="220" y1="160" x2="220" y2="185" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="160" x2="540" y2="185" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="830" y1="160" x2="830" y2="185" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 存储 -->
  <rect x="350" y="280" width="300" height="45" rx="8" fill="#F3F4F6" stroke="#6B7280"/>
  <text x="500" y="300" text-anchor="middle" font-size="12" fill="#374151" font-weight="bold">持久化存储</text>
  <text x="500" y="316" text-anchor="middle" font-size="11" fill="#374151">加密资产 + 承诺 + 主承诺</text>

  <line x1="220" y1="245" x2="220" y2="260" stroke="#6B7280" stroke-width="1"/>
  <line x1="540" y1="245" x2="540" y2="260" stroke="#6B7280" stroke-width="1"/>
  <line x1="830" y1="245" x2="830" y2="260" stroke="#6B7280" stroke-width="1"/>
  <line x1="220" y1="260" x2="830" y2="260" stroke="#6B7280" stroke-width="1"/>
  <line x1="500" y1="260" x2="500" y2="275" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 分发份额 -->
  <rect x="350" y="350" width="300" height="40" rx="8" fill="#4F46E5"/>
  <text x="500" y="375" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">📧 邮件分发份额 v_i, r_i 给监护人</text>

  <line x1="500" y1="325" x2="500" y2="345" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 销毁主密钥 -->
  <rect x="350" y="415" width="300" height="20" rx="4" fill="#FEE2F2" stroke="#EF4444"/>
  <text x="500" y="430" text-anchor="middle" font-size="12" fill="#DC2626" font-weight="bold">🗑️ 内存中销毁主密钥</text>

  <line x1="500" y1="390" x2="500" y2="410" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ====== 阶段间箭头 ====== -->
  <line x1="500" y1="440" x2="500" y2="475" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ====== 阶段二：继承阶段 ====== -->
  <rect x="50" y="480" width="900" height="460" rx="12" fill="url(#phase2)" stroke="#D97706" stroke-width="2"/>
  <text x="500" y="510" text-anchor="middle" font-size="16" font-weight="bold" fill="#D97706">阶段二：继承阶段</text>

  <rect x="100" y="530" width="240" height="40" rx="8" fill="#4F46E5"/>
  <text x="220" y="555" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">继承人发起请求</text>

  <!-- 时间锁判断 -->
  <polygon points="520,530 620,550 520,570 420,550" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
  <text x="520" y="554" text-anchor="middle" font-size="12" fill="#9A3412" font-weight="bold">时间锁?</text>

  <line x1="340" y1="550" x2="415" y2="550" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="660" y="540" font-size="11" fill="#DC2626">未到期 → 拒绝</text>
  <line x1="620" y1="550" x2="700" y2="550" stroke="#DC2626" stroke-width="1"/>
  <rect x="710" y="535" width="200" height="30" rx="6" fill="#FEE2F2" stroke="#EF4444"/>
  <text x="810" y="555" text-anchor="middle" font-size="12" fill="#DC2626">拒绝请求 返回剩余时间</text>

  <text x="560" y="590" font-size="11" fill="#059669">到期 → 通知监护人</text>
  <line x1="520" y1="570" x2="520" y2="600" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="380" y="605" width="280" height="40" rx="8" fill="#4F46E5"/>
  <text x="520" y="630" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">📧 通知所有监护人提交份额</text>

  <line x1="520" y1="645" x2="520" y2="670" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 提交份额 -->
  <rect x="380" y="675" width="280" height="40" rx="8" fill="#4F46E5"/>
  <text x="520" y="700" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">监护人在线提交份额</text>

  <line x1="520" y1="715" x2="520" y2="740" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Pedersen 验证 -->
  <polygon points="520,745 620,765 520,785 420,765" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
  <text x="520" y="762" text-anchor="middle" font-size="11" fill="#9A3412">Pedersen</text>
  <text x="520" y="776" text-anchor="middle" font-size="11" fill="#9A3412">承诺验证</text>

  <!-- 胁迫分支 -->
  <text x="660" y="760" font-size="11" fill="#DC2626">匹配胁迫</text>
  <line x1="620" y1="765" x2="700" y2="765" stroke="#DC2626" stroke-width="1"/>
  <rect x="710" y="750" width="200" height="30" rx="6" fill="#FEE2F2" stroke="#EF4444"/>
  <text x="810" y="770" text-anchor="middle" font-size="12" fill="#DC2626">🚨 触发胁迫警报 继承终止</text>

  <!-- 正常分支 -->
  <text x="550" y="805" font-size="11" fill="#059669">正常 → 收集</text>

  <rect x="100" y="820" width="240" height="40" rx="8" fill="#ECFDF5" stroke="#059669"/>
  <text x="220" y="845" text-anchor="middle" font-size="12" fill="#065F46" font-weight="bold">收集份额 ≥ 门限 t?</text>

  <line x1="520" y1="785" x2="220" y2="815" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="380" y="840" font-size="11" fill="#DC2626">否 → 继续等待</text>
  <line x1="340" y1="840" x2="380" y2="840" stroke="#DC2626" stroke-width="1"/>

  <line x1="220" y1="860" x2="220" y2="880" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="350" y="880" font-size="11" fill="#059669">是 → 恢复主密钥</text>

  <rect x="380" y="875" width="280" height="40" rx="8" fill="#10B981"/>
  <text x="520" y="900" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">🔑 Lagrange 插值恢复主密钥</text>

  <line x1="520" y1="915" x2="520" y2="930" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="420" y="935" width="200" height="30" rx="8" fill="#10B981"/>
  <text x="520" y="955" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">📤 资产交付继承人</text>

  <!-- ====== 阶段间箭头 ====== -->
  <line x1="520" y1="940" x2="520" y2="980" stroke="#6B7280" stroke-width="2"/>

  <!-- ====== 阶段三：刷新阶段 ====== -->
  <rect x="50" y="990" width="900" height="370" rx="12" fill="url(#phase3)" stroke="#059669" stroke-width="2"/>
  <text x="500" y="1020" text-anchor="middle" font-size="16" font-weight="bold" fill="#059669">阶段三：同态份额刷新</text>

  <rect x="350" y="1040" width="300" height="40" rx="8" fill="#4F46E5"/>
  <text x="500" y="1065" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">份额可能泄露 / 需定期刷新</text>

  <line x1="500" y1="1080" x2="500" y2="1100" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="100" y="1105" width="350" height="55" rx="8" fill="#FEF3C7" stroke="#D97706"/>
  <text x="275" y="1125" text-anchor="middle" font-size="12" fill="#92400E" font-weight="bold">生成零和多项式</text>
  <text x="275" y="1143" text-anchor="middle" font-size="11" fill="#92400E">Z_v(x): 值增量多项式, Z_v(0)=0</text>
  <text x="275" y="1155" text-anchor="middle" font-size="11" fill="#92400E">Z_r(x): 盲因子增量多项式, Z_r(0)=0</text>

  <line x1="500" y1="1100" x2="275" y2="1100" stroke="#6B7280" stroke-width="1"/>
  <line x1="275" y1="1080" x2="275" y2="1100" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="550" y="1105" width="350" height="55" rx="8" fill="#FEF3C7" stroke="#D97706"/>
  <text x="725" y="1125" text-anchor="middle" font-size="12" fill="#92400E" font-weight="bold">计算每个份额的增量</text>
  <text x="725" y="1143" text-anchor="middle" font-size="11" fill="#92400E">δ_v(i) = Z_v(i), δ_r(i) = Z_r(i)</text>
  <text x="725" y="1155" text-anchor="middle" font-size="11" fill="#92400E">C'_i = C_i + δ_r·G + δ_v·H</text>

  <line x1="450" y1="1132" x2="545" y2="1132" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="275" y1="1160" x2="275" y2="1185" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="725" y1="1160" x2="725" y2="1185" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- server -->
  <rect x="550" y="1190" width="350" height="40" rx="8" fill="#ECFDF5" stroke="#059669"/>
  <text x="725" y="1215" text-anchor="middle" font-size="12" fill="#065F46" font-weight="bold">Server 更新存储的承诺（EC点运算）</text>

  <!-- 邮件 -->
  <rect x="100" y="1190" width="350" height="40" rx="8" fill="#4F46E5"/>
  <text x="275" y="1215" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">📧 邮件发送增量 δ_v(i) δ_r(i)</text>

  <line x1="275" y1="1230" x2="275" y2="1255" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="100" y="1260" width="350" height="40" rx="8" fill="#10B981"/>
  <text x="275" y="1285" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">监护人本地更新份额 v_i += δ_v, r_i += δ_r</text>

  <line x1="725" y1="1230" x2="725" y2="1275" stroke="#6B7280" stroke-width="2"/>
  <text x="580" y="1285" font-size="13" fill="#059669" font-weight="bold">主承诺 C_master 不变 ✅</text>

  <!-- 底栏 -->
  <rect x="300" y="1340" width="400" height="35" rx="8" fill="#F3F4F6" stroke="#6B7280"/>
  <text x="500" y="1362" text-anchor="middle" font-size="12" fill="#374151">全程不接触主密钥 · 零和多项式一次有效 · 纯EC点运算</text>
</svg>
</body></html>
